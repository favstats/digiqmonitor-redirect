<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigIQ Monitor is verhuisd</title>
    <meta http-equiv="refresh" content="5;url=https://dashboard.dedigiq.nl">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f4f8;
            color: #1a1a2e;
        }
        .container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 520px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.6rem; margin-bottom: 1rem; }
        p { font-size: 1.05rem; line-height: 1.6; color: #444; margin-bottom: 1.5rem; }
        a {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: background 0.2s;
        }
        a:hover { background: #1d4ed8; }
        .note { font-size: 0.85rem; color: #888; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>De DigIQ Monitor is verhuisd!</h1>
        <p>U wordt binnen 5 seconden automatisch doorgestuurd naar het nieuwe adres.</p>
        <a href="https://dashboard.dedigiq.nl">Ga naar dashboard.dedigiq.nl</a>
        <p class="note">The DigIQ Monitor has moved to <strong>dashboard.dedigiq.nl</strong></p>
    </div>
</body>
</html>
