<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigIQ Monitor is verhuisd</title>
    <meta http-equiv="refresh" content="10;url=https://dashboard.dedigiq.nl">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f7f7f7;
            color: #2c3e50;
        }
        .container {
            text-align: center;
            padding: 3rem 2.5rem;
            max-width: 540px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.06);
        }
        .logo {
            margin-bottom: 1.5rem;
        }
        .logo-text {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
        }
        .logo-dig { color: #2a7d6e; }
        .logo-i { color: #e8792f; }
        .logo-q { color: #2a7d6e; }
        .logo-dots {
            display: inline-block;
            margin-left: 2px;
        }
        .logo-dots span {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin: 0 1.5px;
            vertical-align: middle;
        }
        .dot-orange { background: #e8792f; }
        .dot-teal { background: #2a7d6e; }
        .dot-green { background: #8aba5e; }
        .dot-yellow { background: #f5b731; }

        h1 {
            font-family: 'Nunito', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #2a7d6e;
            margin-bottom: 0.75rem;
            font-style: italic;
        }
        p {
            font-size: 1rem;
            line-height: 1.7;
            color: #555;
            margin-bottom: 1.25rem;
        }

        .countdown-wrapper {
            margin: 1.5rem 0;
        }
        .countdown-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .countdown-number {
            font-family: 'Nunito', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: #e8792f;
            line-height: 1;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 0.75rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e8792f, #f5b731);
            border-radius: 3px;
            width: 100%;
            transition: width 1s linear;
        }

        .btn {
            display: inline-block;
            padding: 0.85rem 2.2rem;
            background: #e8792f;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s, transform 0.15s;
        }
        .btn:hover {
            background: #d46a25;
            transform: translateY(-1px);
        }
        .note {
            font-size: 0.82rem;
            color: #aaa;
            margin-top: 1.75rem;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="logo-text">
                <span class="logo-dig">Dig</span><span class="logo-i">I</span><span class="logo-q">Q</span>
            </span>
            <span class="logo-dots">
                <span class="dot-orange"></span>
                <span class="dot-yellow"></span>
                <span class="dot-green"></span>
                <span class="dot-teal"></span>
            </span>
        </div>

        <h1>De DigIQ Monitor is verhuisd!</h1>
        <p>We hebben een nieuw adres. U wordt automatisch doorgestuurd.</p>

        <div class="countdown-wrapper">
            <div class="countdown-label">Doorsturen over</div>
            <div class="countdown-number" id="countdown">10</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
        </div>

        <a class="btn" href="https://dashboard.dedigiq.nl">Ga nu naar dashboard.dedigiq.nl</a>

        <p class="note">The DigIQ Monitor has moved to <strong>dashboard.dedigiq.nl</strong></p>
    </div>

    <script>
        const total = 10;
        let remaining = total;
        const countdownEl = document.getElementById('countdown');
        const progressEl = document.getElementById('progress');

        const timer = setInterval(function() {
            remaining--;
            countdownEl.textContent = remaining;
            progressEl.style.width = ((remaining / total) * 100) + '%';

            if (remaining <= 0) {
                clearInterval(timer);
                window.location.href = 'https://dashboard.dedigiq.nl';
            }
        }, 1000);
    </script>
</body>
</html>
